<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زفاف جوليان وجورجينا</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
    text-align:center;
}

.hero{
    padding:80px 20px;
}

h1{
    color:#d4af37;
    font-size:3rem;
}

.box{
    background:#111;
    margin:20px auto;
    padding:20px;
    max-width:500px;
    border-radius:20px;
}

input,select,textarea{
    width:90%;
    padding:12px;
    margin:10px 0;
}

button{
    background:#d4af37;
    border:none;
    padding:12px 30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="hero">

<h1>جوليان ♥ جورجينا</h1>

<p>دعوة لحضور حفل زفافنا</p>

<p>يرجى تأكيد الحضور أدناه</p>

</div>

<div class="box">

<form id="rsvpForm">

<input type="text" name="name" placeholder="الاسم الكامل" required>

<select name="attendance" required>
<option value="">الحضور؟</option>
<option value="yes">نعم</option>
<option value="no">لا</option>
</select>

<input type="number" name="guests" placeholder="العدد">

<textarea name="message" placeholder="رسالة"></textarea>

<button type="submit">إرسال</button>

</form>

</div>

<script>
document.getElementById("rsvpForm").addEventListener("submit", function(e){
e.preventDefault();

const data = {
name: this.name.value,
attendance: this.attendance.value,
guests: this.guests.value,
message: this.message.value
};

fetch("https://script.google.com/macros/s/AKfycbw48ZHqGrzVUqxGNcKG1140RoIQaVt3plZSV48xLFSPyg1DIKq-zXdo3PFrDVzkMeNp/exec", {
method: "POST",
body: JSON.stringify(data)
})
.then(() => {
alert("تم الإرسال بنجاح 💍");
this.reset();
})
.catch(() => {
alert("خطأ، حاول مرة أخرى");
});
});
</script>

</body>
</html>
