<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زفاف جوليان وجورجينا</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:#070707;
    color:white;
    overflow-x:hidden;
}

/* GOLD BACKGROUND */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 20% 20%, rgba(212,175,55,.12), transparent 40%),
      radial-gradient(circle at 80% 30%, rgba(212,175,55,.08), transparent 45%),
      radial-gradient(circle at 50% 80%, rgba(255,215,140,.06), transparent 50%);
    pointer-events:none;
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
    background:
      linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.65)),
      url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=2000&q=80');
    background-size:cover;
}

/* GLASS CARD */
.card{
    max-width:900px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(18px);
    border:1px solid rgba(212,175,55,.35);
    border-radius:40px;
    padding:70px 40px;
    box-shadow:0 0 60px rgba(212,175,55,.15);
    animation:fadeIn 1.2s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

h1{
    font-size:4rem;
    color:#d4af37;
    font-family:'Cormorant Garamond',serif;
    margin-bottom:10px;
}

.line{
    width:120px;
    height:2px;
    background:#d4af37;
    margin:20px auto;
}

section{
    max-width:900px;
    margin:auto;
    padding:60px 20px;
    text-align:center;
}

.box{
    background:#111;
    border:1px solid rgba(212,175,55,.3);
    border-radius:25px;
    padding:35px;
}

input,select,textarea{
    width:100%;
    padding:14px;
    margin:10px 0;
    background:#1a1a1a;
    color:white;
    border:1px solid rgba(212,175,55,.3);
    border-radius:12px;
}

button{
    background:linear-gradient(135deg,#d4af37,#f7e08a);
    border:none;
    padding:14px 30px;
    border-radius:50px;
    cursor:pointer;
    font-weight:bold;
}

/* BOTTOM TEXT */
.bottom-text{
    text-align:center;
    padding:60px 20px;
    color:#d4af37;
    font-size:1.3rem;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="card">

        <h1>جوليان ♥ جورجينا</h1>

        <p>دعوة لحضور حفل زفافنا</p>

        <div class="line"></div>

        <p>بكل الحب ندعوكم لمشاركتنا أجمل لحظات حياتنا</p>

    </div>
</section>

<!-- DETAILS -->
<section>
    <h2 style="color:#d4af37;">تفاصيل الحفل</h2>

    <div class="box">
        <p>📅 17 يوليو 2026</p>
        <p>📍 قاعة نيسان</p>
    </div>
</section>

<!-- RSVP -->
<section>
    <h2 style="color:#d4af37;">RSVP</h2>

    <div class="box">
        <form id="rsvpForm">

            <input type="text" name="name" placeholder="الاسم الكامل" required>

            <select name="attendance" required>
                <option value="">هل ستتمكن من الحضور؟</option>

                <option value="yes">
                    نعم بالتأكيد، سيكون شرفاً لي الحضور
                </option>

                <option value="no">
                    للأسف لن أتمكن من الحضور، مع خالص التمنيات
                </option>
            </select>

            <input type="number" name="guests" placeholder="العدد">

            <textarea name="message" placeholder="رسالة"></textarea>

            <button type="submit">إرسال</button>

        </form>
    </div>
</section>

<!-- BOTTOM MESSAGE -->
<div class="bottom-text">
يرجى تأكيد الحضور
</div>

<script>
document.getElementById("rsvpForm").addEventListener("submit",function(e){
e.preventDefault();

const data={
name:this.name.value,
attendance:this.attendance.value,
guests:this.guests.value,
message:this.message.value
};

fetch("https://script.google.com/macros/s/AKfycbw48ZHqGrzVUqxGNcKG1140RoIQaVt3plZSV48xLFSPyg1DIKq-zXdo3PFrDVzkMeNp/exec",{
method:"POST",
body:JSON.stringify(data)
})
.then(()=>{
alert("تم إرسال RSVP 💍");
this.reset();
})
.catch(()=>{
alert("حدث خطأ");
});
});
</script>

</body>
</html>
