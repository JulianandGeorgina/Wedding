<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زفاف جوليان وجورجينا</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Cairo',sans-serif;
    background:#080808;
    color:#fff;
    overflow-x:hidden;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 20% 20%, rgba(212,175,55,.08), transparent 30%),
      radial-gradient(circle at 80% 30%, rgba(212,175,55,.08), transparent 30%),
      radial-gradient(circle at 50% 80%, rgba(212,175,55,.08), transparent 30%);
    pointer-events:none;
}

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:30px;
    background:
      linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
      url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=1800&q=80');
    background-size:cover;
    background-position:center;
}

.card{
    max-width:850px;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(14px);
    border:1px solid rgba(212,175,55,.45);
    border-radius:35px;
    padding:70px 45px;
    box-shadow:0 0 40px rgba(212,175,55,.15);
}

.names{
    font-family:'Cormorant Garamond',serif;
    color:#d4af37;
    font-size:4.5rem;
    margin-bottom:20px;
}

.subtitle{
    font-size:1.6rem;
    margin-bottom:20px;
}

.gold-line{
    width:130px;
    height:2px;
    background:#d4af37;
    margin:25px auto;
}

section{
    max-width:1000px;
    margin:auto;
    padding:80px 20px;
    text-align:center;
}

.section-title{
    color:#d4af37;
    font-size:2.2rem;
    margin-bottom:30px;
}

.box{
    background:#111;
    border:1px solid rgba(212,175,55,.35);
    border-radius:25px;
    padding:40px;
}

input, select, textarea{
    width:100%;
    background:#1a1a1a;
    color:#fff;
    border:1px solid rgba(212,175,55,.35);
    border-radius:15px;
    padding:16px;
    margin:12px 0;
    font-size:1rem;
}

button{
    background:#d4af37;
    color:#000;
    border:none;
    border-radius:50px;
    padding:16px 40px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

footer{
    text-align:center;
    padding:40px;
    color:#d4af37;
}
</style>
</head>

<body>

<section class="hero">
    <div class="card">

        <div class="names">جوليان ♥ جورجينا</div>

        <div class="subtitle">دعوة لحضور حفل زفافنا</div>

        <div class="gold-line"></div>

        <p>
            بكل حب وفرح، نتشرف بدعوتكم لمشاركتنا أجمل لحظات حياتنا  
            والاحتفال معنا بيوم زفافنا المميز
        </p>

        <div class="gold-line"></div>

        <p>الجمعة 17 يوليو 2026</p>

        <div class="gold-line"></div>

        <h2 style="color:#d4af37; margin-top:20px;">
            يرجى تأكيد الحضور أدناه
        </h2>

        <h3 style="color:#fff; font-weight:300; margin-top:10px;">
            Please RSVP below
        </h3>

    </div>
</section>

<section>
    <h2 class="section-title">تفاصيل الحفل</h2>
    <div class="box">
        <p>📅 17 يوليو 2026</p>
        <p>📍 قاعة نيسان</p>
    </div>
</section>

<section>
    <h2 class="section-title">تأكيد الحضور</h2>

    <div class="box">

        <form id="rsvpForm">

            <input type="text" name="name" placeholder="الاسم الكامل" required>

            <select name="attendance" required>
                <option value="">هل ستتمكن من الحضور؟</option>
                <option value="yes">نعم، سأكون سعيداً بالحضور</option>
                <option value="no">للأسف، لن أتمكن من الحضور</option>
            </select>

            <input type="number" name="guests" placeholder="العدد">

            <textarea name="message" rows="4" placeholder="رسالة (اختياري)"></textarea>

            <button type="submit">إرسال تأكيد الحضور</button>

        </form>

    </div>
</section>

<footer>
♥ جوليان وجورجينا ♥
</footer>

<script>
document.getElementById("rsvpForm").addEventListener("submit", function(e){
    e.preventDefault();

    const data = {
        name: this.name.value,
        attendance: this.attendance.value,
        guests: this.guests.value,
        message: this.message.value
    };

    fetch("https://script.google.com/macros/s/AKfycbw48ZHqGrzVUqxGNcKG1140RoIQaVt3plZSV48xLFSPyg1DIKq-zXdo3PFrDVzkMeNp/exec", {
        method: "POST",
        body: JSON.stringify(data)
    })
    .then(() => {
        alert("تم إرسال تأكيد الحضور 💍");
        this.reset();
    })
    .catch(() => {
        alert("حدث خطأ، حاول مرة أخرى");
    });
});
</script>

</body>
</html>
