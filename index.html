<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>زفاف جوليان وجورجينا</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:#070707;
    color:white;
    overflow-x:hidden;
}

/* GOLD BACKGROUND */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 20% 20%, rgba(212,175,55,.12), transparent 40%),
      radial-gradient(circle at 80% 30%, rgba(212,175,55,.08), transparent 45%),
      radial-gradient(circle at 50% 80%, rgba(255,215,140,.06), transparent 50%);
    pointer-events:none;
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
    background:
      linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.65)),
      url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?auto=format&fit=crop&w=2000&q=80');
    background-size:cover;
}

/* GLASS CARD */
.card{
    max-width:900px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(18px);
    border:1px solid rgba(212,175,55,.35);
    border-radius:40px;
    padding:70px 40px;
    box-shadow:0 0 60px rgba(212,175,55,.15);
    animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

/* NAME */
h1{
    font-size:4rem;
    color:#d4af37;
    margin-bottom:10px;
    font-family:'Cormorant Garamond',serif;
}

/* LINE */
.line{
    width:120px;
    height:2px;
    background:#d4af37;
    margin:20px auto;
}

/* SECTION */
section{
    max-width:900px;
    margin:auto;
    padding:70px 20px;
    text-align:center;
}

/* BOX */
.box{
    background:#111;
    border:1px solid rgba(212,175,55,.3);
    border-radius:25px;
    padding:40px;
}

/* INPUTS */
input,select,textarea{
    width:100%;
    background:#1a1a1a;
    color:#fff;
    border:1px solid rgba(212,175,55,.3);
    border-radius:15px;
    padding:14px;
    margin:10px 0;
}

/* BUTTON */
button{
    background:linear-gradient(135deg,#d4af37,#f7e08a);
    border:none;
    padding:14px 35px;
    border-radius:50px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* SUCCESS POPUP */
.success{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.5);
    background:rgba(0,0,0,.95);
    border:1px solid #d4af37;
    padding:40px;
    border-radius:25px;
    text-align:center;
    opacity:0;
    transition:0.4s;
    z-index:999;
}

.success.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
}

.success h2{
    color:#d4af37;
}

/* SMALL GOLD PARTICLES */
.particles{
    position:fixed;
    inset:0;
    pointer-events:none;
}

.particle{
    position:absolute;
    width:5px;
    height:5px;
    background:#d4af37;
    border-radius:50%;
    animation:fall 6s linear infinite;
}

@keyframes fall{
    0%{transform:translateY(-10vh);opacity:0}
    10%{opacity:1}
    100%{transform:translateY(110vh);opacity:0}
}
</style>
</head>

<body>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- HERO -->
<section class="hero">
    <div class="card">

        <h1>جوليان ♥ جورجينا</h1>

        <p>دعوة لحضور حفل زفاف فاخر</p>

        <div class="line"></div>

        <p>بكل الحب والفرح ندعوكم لمشاركتنا أجمل ليلة في حياتنا</p>

        <p style="margin-top:15px;">يرجى تأكيد الحضور أدناه</p>
        <p>Please RSVP below</p>

    </div>
</section>

<!-- DETAILS -->
<section>
    <h2 style="color:#d4af37;">تفاصيل الحفل</h2>

    <div class="box">
        <p>📅 17 يوليو 2026</p>
        <p>📍 قاعة نيسان</p>
    </div>
</section>

<!-- RSVP -->
<section>
    <h2 style="color:#d4af37;">RSVP</h2>

    <div class="box">
        <form id="rsvpForm">

            <input type="text" name="name" placeholder="الاسم الكامل" required>

            <select name="attendance" required>
                <option value="">الحضور؟</option>
                <option value="yes">نعم</option>
                <option value="no">لا</option>
            </select>

            <input type="number" name="guests" placeholder="العدد">

            <textarea name="message" placeholder="رسالة"></textarea>

            <button type="submit">إرسال</button>

        </form>
    </div>
</section>

<!-- SUCCESS -->
<div class="success" id="successBox">
    <h2>تم إرسال RSVP 💍</h2>
    <p>شكراً لكم</p>
</div>

<script>

/* PARTICLES */
const container=document.getElementById("particles");

for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="particle";
    p.style.left=Math.random()*100+"vw";
    p.style.animationDuration=(4+Math.random()*4)+"s";
    container.appendChild(p);
}

/* RSVP SEND TO GOOGLE SHEETS */
document.getElementById("rsvpForm").addEventListener("submit",function(e){
e.preventDefault();

const data={
name:this.name.value,
attendance:this.attendance.value,
guests:this.guests.value,
message:this.message.value
};

fetch("https://script.google.com/macros/s/AKfycbw48ZHqGrzVUqxGNcKG1140RoIQaVt3plZSV48xLFSPyg1DIKq-zXdo3PFrDVzkMeNp/exec",{
method:"POST",
body:JSON.stringify(data)
})
.then(()=>{

document.getElementById("successBox").classList.add("show");

setTimeout(()=>{
document.getElementById("successBox").classList.remove("show");
},3000);

this.reset();

})
.catch(()=>alert("Error"));

});
</script>

</body>
</html>
